<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Keyboard disabled — symbolic, panel will recolor -->
  <g fill="#2e3436">
    <!-- Keyboard body -->
    <rect x="1" y="4" width="14" height="8" rx="1.2" fill="none" stroke="#2e3436" stroke-width="1.2"/>
    <!-- Top row keys -->
    <rect x="3" y="5.8" width="1.4" height="1.2" rx="0.3"/>
    <rect x="5.3" y="5.8" width="1.4" height="1.2" rx="0.3"/>
    <rect x="7.6" y="5.8" width="1.4" height="1.2" rx="0.3"/>
    <rect x="9.9" y="5.8" width="1.4" height="1.2" rx="0.3"/>
    <rect x="12.2" y="5.8" width="1.4" height="1.2" rx="0.3"/>
    <!-- Bottom row: space bar -->
    <rect x="4.5" y="8.8" width="7" height="1.2" rx="0.3"/>
    <!-- Diagonal slash -->
    <line x1="2" y1="13" x2="14" y2="3" stroke="#2e3436" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
