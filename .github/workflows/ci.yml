name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # libtypio is built in-tree with cargo. Its build.rs emits the .pc files
  # and the cdylib under target/release, so point pkg-config / the linker
  # there (see meson.build "local cargo build" note).
  PKG_CONFIG_PATH: ${{ github.workspace }}/_libtypio/target/release
  LD_LIBRARY_PATH: ${{ github.workspace }}/_libtypio/target/release

jobs:
  build-test:
    name: Build & test against libtypio
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libdbus-1-dev libpipewire-0.3-dev \
            libfreetype6-dev libharfbuzz-dev libfontconfig-dev \
            libvulkan-dev glslang-tools

      # libtypio is a separate repo under the same owner. flux is pulled
      # by the host's subprojects/flux.wrap at configure time.
      - name: Checkout libtypio
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/libtypio
          path: _libtypio

      # libtypio is a Cargo project (cdylib + full C ABI headers); it has no
      # meson build. cargo build emits libtypio.so plus libtypio.pc /
      # typio-engine-abi.pc into target/release for pkg-config to pick up.
      - name: Build libtypio
        run: cargo build --release --manifest-path _libtypio/Cargo.toml

      - name: Configure host
        run: meson setup build --prefix="$HOME/.local" -Denable_systray=true

      - name: Build
        run: ninja -C build

      - name: Test
        run: meson test -C build --print-errorlogs
